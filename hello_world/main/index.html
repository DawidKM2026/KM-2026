<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>KM projekt 2026</title>
</head>

<body>
    <h1 style="text-align:center;"> KM projekt praktyki 2026</h1>
    <div style="margin-left: 30px;">
        <h1>Ręczne sterowanie:</h1>
        <input type="radio" id="manual_off" name="movement" value="manual_off">
        <label style="font-size: xx-large;" for="manual_off">OFF</label><br>
        <input type="radio" id="surge" name="movement" value="surge">
        <label style="font-size: xx-large;" for="surge">Surge</label><br>
        <input type="radio" id="sway" name="movement" value="sway">
        <label style="font-size: xx-large;" for="sway">Sway</label><br>
        <input type="radio" id="heading" name="movement" value="heading">
        <label style="font-size: xx-large;" for="heading">Heading</label><br>
        <input type="radio" id="pr" name="movement" value="pr">
        <label style="font-size: xx-large;" for="pr">Pitch / Roll</label>

        <h1>Home:</h1>
        <button style="display: none;"id="bazuj">Bazuj</button>
        <label for="bazuj" style="
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            font-size: x-large;">
            Bazuj
        </label>

        <h1>Aktualizacja:</h1>
        <form method='POST' action='/update' enctype='multipart/form-data'>
            <input type="file" id="plik" style="display: none;">
            <label for="plik" style="
                background: #007bff;
                color: white;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                display: inline-block;
                font-size: x-large;">
                Wybierz plik
            </label>
            <input type="submit" id="submitButton" style="display: none;">
            <label for="submitButton" style="
                background: #007bff;
                color: white;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                display: inline-block;
                font-size: x-large;">
                Prześlij
            </label>
        </form>
    </div>


</body>

</html>
